services:
  - type: web
    name: codertalk-fullstack
    runtime: docker
    rootDir: chat_app/backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: GIN_MODE
        value: release
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
