version: '3.8'

services:
  codertalk-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codertalk_server
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - GIN_MODE=release
      # Use your existing Supabase Postgres connection string
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET:-super-secret-production-jwt-key-change-me}
      - APP_URL=${APP_URL:-http://localhost:8080}
      # Optional Cloudflare R2 values (if empty, server stores files locally inside ./data)
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-codertalk-files}
      # Cookie Security
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      # CORS — comma-separated allowed origins
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
    volumes:
      - codertalk_data:/root/data

volumes:
  codertalk_data:
